# ======================== 服务器配置 ========================
server:
  # 应用服务端口号，启动后通过 http://localhost:8080 访问
  port: 8080

# ======================== Spring 配置 ========================
spring:
  application:
    # 应用名称，用于日志输出和服务注册
    name: inote

  profiles:
    # 激活的配置文件，对应 application-local.yml，本地开发环境使用
    active: local

  servlet:
    multipart:
      # 启用文件上传功能（multipart/form-data 表单提交）
      enabled: true
      # 单个上传文件的最大大小限制为 50MB
      max-file-size: 50MB
      # 整个请求（含所有文件）的最大大小限制为 50MB
      max-request-size: 50MB

  # ======================== Spring AI 配置 ========================
  ai:
    openai:
      # OpenAI 兼容 API 的密钥，优先从环境变量 ALI_API_KEY 读取，未设置时使用默认占位符
      api-key: ${ALI_API_KEY:your-api-key-here}
      # 阿里云 DashScope OpenAI 兼容模式的 API 基础地址（Spring AI 会自动拼接 /v1/chat/completions 等路径）
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          # 聊天模型名称，使用通义千问 qwen3-max 模型
          model: qwen3-max
          # 生成温度（0-1），越高越有创造性，0.7 兼顾准确性和多样性
          temperature: 0.7
          # 单次回答的最大 token 数量限制
          max-tokens: 2000
      embedding:
        options:
          # 文本嵌入模型名称，使用 DashScope 的 text-embedding-v2 模型，输出 1536 维向量
          model: text-embedding-v2
    dashscope:
      # DashScope 专用 API 密钥（用于重排序等 DashScope 特有服务）
      # 默认使用 openai.api-key 的值，如需单独配置请取消注释并设置
      # api-key: ${DASHSCOPE_API_KEY:${ALI_API_KEY:your-api-key-here}}

    # ======================== 向量存储（Milvus）配置 ========================
    vectorstore:
      milvus:
        client:
          # Milvus 向量数据库服务器地址，优先从环境变量读取，默认 localhost
          host: ${MILVUS_HOST:localhost}
          # Milvus 服务器端口号，默认 19530
          port: ${MILVUS_PORT:19530}
        # Milvus 数据库名称
        database-name: default
        # Milvus 集合名称（类似关系数据库的表名），存储文档向量
        collection-name: inote_documents
        # 向量维度，必须与嵌入模型输出维度一致（text-embedding-v2 输出 1536 维）
        embedding-dimension: 1536
        # 向量索引类型，IVF_FLAT 是倒排文件索引，适合中等规模数据集，精度高
        index-type: IVF_FLAT
        # 向量相似度度量方式，COSINE 余弦相似度，衡量方向相似性
        metric-type: COSINE
        # 是否在启动时自动创建集合和索引（不存在时创建）
        initialize-schema: true

# ======================== 备选模型配置 ========================
ai:
  fallback:
    # 备选模型名称，使用 Kimi（月之暗面）的 kimi-2.5 模型
    model: kimi-2.5
    # Kimi API 密钥，优先从环境变量读取
    api-key: ${KIMI_API_KEY:your-kimi-api-key-here}
    # Kimi（月之暗面）API 地址
    base-url: https://api.moonshot.cn/v1

# ======================== RAG 检索管线配置 ========================
rag:
  # 查询重写：LLM 将口语化查询改写为专业检索语句
  query-rewrite-enabled: false
  # 多查询分解：将复杂查询拆分为多个子查询
  multi-query-enabled: false
  max-sub-queries: 3
  # 混合检索：向量检索 + BM25 关键词检索
  hybrid-search-enabled: false
  vector-top-k: 10
  bm25-top-k: 10
  similarity-threshold: 0.5
  rrf-k: 60.0
  # 重排序：DashScope gte-rerank 模型
  rerank-enabled: false
  rerank-model: gte-rerank
  rerank-top-n: 3
  # 默认检索数量
  final-top-k: 3

# ======================== 文件上传配置 ========================
file:
  upload:
    # 上传文件的本地存储目录路径
    path: ./uploads
    # 应用级文件大小限制（与 servlet.multipart 配合使用）
    max-size: 50MB

# ======================== 日志配置 ========================
logging:
  level:
    # 项目代码日志级别设为 DEBUG，输出详细调试信息
    com.inote: DEBUG
    # Spring AI 框架日志级别设为 DEBUG，方便排查 AI 调用问题
    org.springframework.ai: DEBUG
