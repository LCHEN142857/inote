server:
  port: 8080

spring:
  application:
    name: inote

  profiles:
    active: local

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inote}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      api-key: ${ALI_API_KEY:your-api-key-here}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3-max
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-v2
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
        database-name: default
        collection-name: inote_documents
        embedding-dimension: 1536
        index-type: IVF_FLAT
        metric-type: COSINE
        initialize-schema: true

ai:
  fallback:
    model: kimi-2.5
    api-key: ${KIMI_API_KEY:your-kimi-api-key-here}
    base-url: https://api.moonshot.cn/v1

rag:
  query-rewrite-enabled: false
  multi-query-enabled: false
  max-sub-queries: 3
  hybrid-search-enabled: false
  vector-top-k: 10
  bm25-top-k: 10
  similarity-threshold: 0.5
  rrf-k: 60.0
  rerank-enabled: false
  rerank-model: gte-rerank
  rerank-top-n: 3
  final-top-k: 3

file:
  upload:
    path: ./uploads
    max-size: 50MB

logging:
  level:
    com.inote: DEBUG
    org.springframework.ai: DEBUG
